name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - "api/**"
      - "populate-pokemon-db.py"
      - "preprocess-color-pokemon.py"
      - "build_index.py"
      - "sync_prices.py"
      - "export_pages_data.py"
      - "Pokémon Mosaics - Database/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      full_regeneration:
        description: "Run full dataset generation (can be long-running)"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: pokemon_tcg
          MYSQL_USER: pokemon
          MYSQL_PASSWORD: pokemon
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_HOST: 127.0.0.1
      DB_USER: pokemon
      DB_PASSWORD: pokemon
      DB_NAME: pokemon_tcg
      POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -u"$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" < "Pokémon Mosaics - Database/pokemon-tcg-schema.sql"

      - name: Generate DB content
        env:
          FULL_REGENERATION: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.full_regeneration == true || inputs.full_regeneration == 'true')) }}
        run: |
          set -euo pipefail
          if [[ "$FULL_REGENERATION" == "true" ]]; then
            python populate-pokemon-db.py
            python preprocess-color-pokemon.py --force
            python build_index.py --force
            python sync_prices.py
          else
            python populate-pokemon-db.py \
              --max-sets 3 \
              --max-card-files 6 \
              --max-cards-per-set 200 \
              --max-deck-files 3 \
              --max-decks-per-file 100
            python preprocess-color-pokemon.py --limit 1500
            python build_index.py --limit 1500
            python sync_prices.py --limit 1000
          fi

      - name: Export Pages data artifacts
        run: |
          set -euo pipefail
          if ! python export_pages_data.py \
            --output-dir deploy/pages/data \
            --max-cards 5000 \
            --max-prices 5000; then
            echo "::error::export_pages_data.py failed. Ensure all exported fields are JSON-serializable."
            exit 1
          fi

      - name: Assemble Pages site
        run: |
          mkdir -p deploy/pages/static
          cp static/index.html deploy/pages/index.html
          cp static/app.js deploy/pages/static/app.js
          cp static/config.js deploy/pages/static/config.js

      - name: Validate artifact files
        run: |
          set -euo pipefail
          test -s deploy/pages/index.html
          test -s deploy/pages/static/app.js
          test -s deploy/pages/static/config.js
          test -s deploy/pages/data/build-info.json
          test -s deploy/pages/data/cards.json
          test -s deploy/pages/data/latest-prices.json
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          paths = [
              Path("deploy/pages/data/build-info.json"),
              Path("deploy/pages/data/cards.json"),
              Path("deploy/pages/data/latest-prices.json"),
          ]
          for path in paths:
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
          index_html = Path("deploy/pages/index.html").read_text(encoding="utf-8")
          script_srcs = re.findall(r'<script[^>]+src=["\']([^"\']+)["\']', index_html)
          if any(src.startswith("/static/") for src in script_srcs):
              raise SystemExit(
                  "index.html contains absolute /static paths; use relative static/... for project Pages deployments."
              )
          required_script_refs = ("static/config.js", "static/app.js")
          for script_ref in required_script_refs:
              if script_ref not in script_srcs:
                  raise SystemExit(f"index.html missing required script reference: {script_ref}")
          print("JSON artifacts are valid.")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
